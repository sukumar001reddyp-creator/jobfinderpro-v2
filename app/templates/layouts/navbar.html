<!-- ================= Navbar ================= -->
<nav class="navbar navbar-expand-lg navbar-light bg-white sticky-top shadow-sm py-3 border-bottom">
    <div class="container">

        <!-- Logo -->
        <a class="navbar-brand d-flex align-items-center fw-bold fs-3 text-decoration-none" href="/">
            <i class="bi bi-briefcase-fill text-primary me-2"></i>
            JobFinder <span class="text-primary">Pro</span>
        </a>

        <!-- Mobile Toggle -->
        <button class="navbar-toggler border-0 shadow-none" type="button" 
                data-bs-toggle="collapse" data-bs-target="#navbarContent">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarContent">
            
            <!-- Main Menu -->
            <ul class="navbar-nav mx-auto mb-2 mb-lg-0 gap-1 gap-lg-4">
                <li class="nav-item">
                    <a class="nav-link fw-semibold {% if request.path == '/' %}active{% endif %}" href="/">Home</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link fw-semibold {% if request.path == '/jobs' %}active{% endif %}" href="/jobs">Jobs</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link fw-semibold {% if request.path == '/companies' %}active{% endif %}" href="/companies">Companies</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link fw-semibold {% if request.path == '/resume-builder' %}active{% endif %}" href="/resume-builder">Resume Builder</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link fw-semibold {% if request.path == '/ai-tools' %}active{% endif %}" href="/ai-tools">AI Tools</a>
                </li>
            </ul>

            <!-- Right Side -->
            <div class="d-flex align-items-center gap-3 ms-lg-auto">
                {% if current_user.is_authenticated %}
                    <span class="text-dark fw-semibold">Hi, {{ current_user.username }}</span>
                    <a href="/dashboard" class="btn btn-outline-primary rounded-pill px-4 fw-semibold">Dashboard</a>
                    <a href="/logout" class="btn btn-danger rounded-pill px-4 fw-semibold">Logout</a>
                {% else %}
                    <a href="/login" class="btn btn-outline-primary rounded-pill px-4 fw-semibold">Login</a>
                    <a href="/register" class="btn btn-primary rounded-pill px-4 fw-semibold">Register</a>
                {% endif %}
            </div>
        </div>
    </div>
</nav>
